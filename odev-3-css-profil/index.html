<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Profil Kartı</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #46e781, #3e86b0);
            font-family: Arial, sans-serif;
        }

        .profile-card {
            width: 300px;
            background-color: white;
            text-align: center;
            padding: 20px;
            border-radius: 10px;
        }

        .profile-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid #1a95e7;
        }

        h2 {
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        p {
            color: rgb(0, 0, 0);
            margin-bottom: 20px;
        }

        .buttons a {
            text-decoration: none;
            background-color: #4a8ab5;
            color: rgb(251, 247, 247);
            padding: 8px 12px;
            margin: 5px;
            border-radius: 5px;
            display: inline-block;
            transition: 0.3s;
        }

        .buttons a:hover {
            background-color: #000000;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src='bayrak.jpg'alt="Profil Resmi">

        <h2>İrem SARI</h2>
        <p>Web Tasarım Öğrencisi</p>

        <div class="buttons">
            <a href="#">GitHub</a>
            <a href="#">LinkedIn</a>
        </div>
    </div>

</body>
</html>
